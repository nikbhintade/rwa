enum AssetClass {
  stablecoin
  treasury
}

type Token {
  id: ID! # {chainId}_{tokenAddress}
  chainId: Int!
  address: String! @index
  assetClass: AssetClass! @index
  totalSupply: BigInt!
  lastDayId: Int!
  dayData: [TokenDayData!]! @derivedFrom(field: "token")
  holders: [HolderBalance!]! @derivedFrom(field: "token")
}

type TokenDayData @index(fields: ["token", ["date", "DESC"]]) @index(fields: [["date", "DESC"]]) {
  id: ID! # {chainId}_{tokenAddress}_{dayId}
  token: Token! @index
  chainId: Int!
  date: Int! # Midnight UTC timestamp of the day (dayId * 86400)
  dailyTotalSupply: BigInt! # End-of-day totalSupply snapshot
  dailyMintAmount: BigInt!
  dailyBurnAmount: BigInt!
  dailyTransferAmount: BigInt!
  dailyTransferCount: Int!
  dailyActiveAddresses: Int!
}

type HolderBalance @index(fields: ["token", ["balance", "DESC"]]) {
  id: ID! # {chainId}_{tokenAddress}_{holderAddress}
  token: Token! @index
  chainId: Int!
  holder: String! @index
  balance: BigInt!
  firstTransferTimestamp: BigInt!
  lastTransferTimestamp: BigInt!
}

type DailyActiveAddress {
  id: ID! # {chainId}_{tokenAddress}_{dayId}_{address}
  token: Token! @index
  chainId: Int!
  date: Int! @index
  address: String! @index
}

# --- USYC NAV (Hashnote/Circle YieldTokenAggregator oracle) ---
# USYC is non-rebasing: supply is fixed and the per-token price climbs as yield
# accrues. The oracle prints NAV directly via BalanceReported, ~once per
# business day — so each event IS a NAV datapoint (no formula to compute).
type UsycNavReport {
  id: ID! # {chainId}_{blockNumber}_{logIndex}
  chainId: Int!
  oracle: String! @index
  roundId: BigInt!
  price: BigInt! # NAV per token, 8 decimals
  balance: BigInt! # fund balance / AUM, 2 decimals USD
  interest: BigInt! # accrued interest, 2 decimals USD
  updatedAt: BigInt! # oracle report timestamp
  date: Int! @index # UTC-midnight of updatedAt, for daily charting
  blockNumber: Int!
  blockTimestamp: Int!
}

# Effective subscription price for the next business day. Also fires on owner
# override via setNextPrice, so it is NOT necessarily a fresh NAV print.
type UsycNextPrice {
  id: ID! # {chainId}_{blockNumber}_{logIndex}
  chainId: Int!
  price: BigInt! # next-day subscription price, 8 decimals
  blockTimestamp: Int!
}

# Singleton per chain (id = {chainId}) holding the latest NAV print.
type UsycOracleState {
  id: ID!
  chainId: Int!
  latestRoundId: BigInt!
  latestPrice: BigInt!
  latestUpdatedAt: BigInt!
}

# --- USDY NAV (Ondo RWADynamicOracle) ---
# A rate segment of the NAV curve, set via RangeSet / RangeOverriden. NAV within
# a segment accrues by compounding `dailyInterestRate` (RAY, 1e27) off
# `prevRangeClosePrice` (18-dec) and emits no per-price event, so the daily
# series in NavDay is computed from these parameters.
type NavRange {
  id: ID! # {chainId}_{rangeIndex}
  chainId: Int!
  oracle: String! @index
  rangeIndex: Int! @index
  start: BigInt! # segment start timestamp (seconds)
  end: BigInt! # segment end timestamp (exclusive)
  dailyInterestRate: BigInt! # RAY (1e27) per-day multiplier
  prevRangeClosePrice: BigInt! # 18-dec price anchoring this segment
  overridden: Boolean! # true if last written by RangeOverriden
  updatedAt: BigInt! # block timestamp of the last set/override
}

# One NAV datapoint per elapsed day of a range. price is 18-dec fixed point with
# 8-dec precision, matching the oracle's roundUpTo8 / getPriceHistorical output.
type NavDay @index(fields: [["date", "DESC"]]) {
  id: ID! # {chainId}_{date}
  chainId: Int!
  oracle: String! @index
  rangeIndex: Int! @index
  date: Int! # UTC-midnight-aligned day timestamp (start + d*86400)
  price: BigInt! # NAV in 18 decimals
}

# --- Treasury NAV & yield (CUMIU, USTB, USTBL) ---
# Generic NAV/yield tracking for treasury tokens whose price is published by an
# oracle. Step oracles print a fresh NAV on each update (CUMIU `updatedNAV`,
# USTBL Chainlink `AnswerUpdated`); USTB's Superstate oracle emits checkpoints
# between which NAV is linearly interpolated. `nav` is fixed-point with
# `decimals` decimals (CUMIU 4, USTB 6, USTBL 6).

# Per-chain-per-oracle singleton: latest NAV plus bookkeeping for daily backfill.
type NavOracleState {
  id: ID! # {chainId}_{oracleAddress}
  chainId: Int!
  oracle: String! @index
  token: String!
  decimals: Int!
  latestNav: BigInt!
  latestUpdatedAt: BigInt!
  lastSnapshotDay: Int! # last 00:00 UTC day already written to NavDailySnapshot
}

# One row per oracle NAV update (every change). yieldPerAnnum is the simple
# (non-compounded) annualised yield vs the previous update, scaled 1e18.
type NavUpdate @index(fields: ["token", ["date", "DESC"]]) {
  id: ID! # {chainId}_{oracle}_{blockNumber}_{logIndex}
  chainId: Int!
  oracle: String! @index
  token: String! @index
  nav: BigInt!
  decimals: Int!
  prevNav: BigInt
  yieldPerAnnum: BigInt! # 1e18-scaled annualised yield since prevNav (0 on first)
  roundId: BigInt # set for Chainlink-style feeds (USTBL)
  updatedAt: BigInt!
  date: Int! @index # UTC midnight of updatedAt
  blockNumber: Int!
  blockTimestamp: Int!
}

# NAV at 00:00 UTC, one row per oracle per day. Step oracles snapshot the NAV
# effective at midnight; USTB interpolates between checkpoints. Filled by
# backfill on each update, so the current day lands once the next update arrives
# (<=1 day tail lag).
type NavDailySnapshot @index(fields: ["token", ["date", "DESC"]]) @index(fields: [["date", "DESC"]]) {
  id: ID! # {chainId}_{oracle}_{date}
  chainId: Int!
  oracle: String! @index
  token: String! @index
  date: Int!
  nav: BigInt!
  decimals: Int!
}

# --- Rebase-yield funds (BENJI, iBENJI, BUIDL, BUIDL-I, WTGXX, FDIT) ---
# These are $1.00-pinned money funds: NAV per share never moves, so yield is
# paid as new shares minted to every holder (`balance * r`, r identical across
# holders). We recover the per-share period rate r at the dividend mint as
# `mint / priorBalance`, confirming a distribution only when >=2 same-day
# zero-address mints share the ratio (a one-off subscription mint has no matching
# partner; a new investor with prior balance 0 is skipped). BENJI/iBENJI
# distribute daily; BUIDL/WTGXX/FDIT distribute ~monthly — periodDays (the gap
# since the previous distribution) makes the annualisation cadence-agnostic. The
# constant $1.00 NAV is written separately to NavDailySnapshot from transfers.
type RebaseYield @index(fields: ["token", ["date", "DESC"]]) @index(fields: [["date", "DESC"]]) {
  id: ID! # {chainId}_{tokenAddress}_{date}
  chainId: Int!
  token: String! @index # BENJI | iBENJI | BUIDL | BUIDL-I | WTGXX | FDIT
  tokenAddress: String! @index
  date: Int! # UTC midnight of the distribution
  periodDays: Int! # days since the previous distribution (0 = first, unknown)
  periodYield: BigInt! # per-share growth in this distribution, 1e18-scaled (r)
  annualizedYield: BigInt! # periodYield * 365 / periodDays, 1e18 (0 on first)
  trailingApy: BigInt! # mean annualizedYield over distributions in the last 7 days, 1e18
  wowChange: BigInt! # trailingApy minus the trailingApy 7 days ago (signed, 1e18)
  sharesDistributed: BigInt! # dividend shares minted in this distribution
  sharesOutstanding: BigInt! # totalSupply right after the distribution
}

# Per-token detection state. Tracks the open day, the previous distribution day
# (for periodDays), and up to two candidate ratios; the first candidate to reach
# >=2 matching mints is the confirmed distribution.
type RebaseYieldState {
  id: ID! # {chainId}_{tokenAddress}
  chainId: Int!
  token: String!
  tokenAddress: String!
  openDay: Int! # UTC midnight currently being accumulated
  confirmedDay: Int! # day already emitted as a RebaseYield (-1 if none)
  lastDistDay: Int! # midnight of the previous confirmed distribution (0 if none)
  curPeriodDays: Int! # periodDays cached for the current day's distribution
  candRateA: BigInt!
  candCountA: Int!
  candSharesA: BigInt!
  candRateB: BigInt!
  candCountB: Int!
  candSharesB: BigInt!
}
