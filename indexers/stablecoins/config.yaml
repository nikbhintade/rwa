# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: erc20-indexer
description: ERC-20 Indexer
contracts:
  - name: Stablecoins
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"
  # Ethereum mainnet USDT: issue/redeem do NOT emit Transfer, so supply is
  # tracked via the custom Issue/Redeem events.
  - name: USDT
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"
      - event: "Issue(uint256 amount)"
      - event: "Redeem(uint256 amount)"
  # Bridged USDT (all non-Ethereum chains): mint/burn/redeem internally call
  # _mint/_burn which emit Transfer to/from the zero address, so the Transfer
  # handler already tracks supply. Registering Mint/Burn/Redeem here would
  # double-count.
  - name: USDTBridged
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"
  # US Treasuries asset class — tokenised money-market / T-bill funds (USYC,
  # BUIDL, USDY, BENJI/iBENJI, WTGXX, JTRSY, USTB, OUSG, CUMIU, USTBL, FDIT).
  # All standard ERC-20s; supply/holders tracked from Transfer (zero-address
  # mints/burns), same as the Stablecoins group.
  - name: Treasuries
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"
      # CUMIU publishes NAV from the token itself (only emitter in this group);
      # handler filters by srcAddress. newNAV is 1e4 fixed-point (NAVScalingFactor).
      - event: "updatedNAV(uint256 indexed epoch, uint256 previousNAV, uint256 newNAV)"
  # Ondo RWADynamicOracle — source of USDY NAV. The token itself has no price
  # concept; NAV lives here. These events fire only when Ondo changes the rate
  # schedule (~monthly); the daily NAV series is computed from their params.
  - name: USDYNavOracle
    events:
      - event: "RangeSet(uint256 indexed index, uint256 start, uint256 end, uint256 dailyInterestRate, uint256 prevRangeClosePrice)"
      - event: "RangeOverriden(uint256 indexed index, uint256 newStart, uint256 newEnd, uint256 newDailyInterestRate, uint256 newPrevRangeClosePrice)"
  # Hashnote/Circle YieldTokenAggregator — USYC NAV oracle. Logs emit from the
  # proxy. BalanceReported prints NAV (price, 8-dec) once per business day;
  # NextPriceReported gives next-day subscription price (also on owner override).
  - name: USYCOracle
    events:
      - event: "BalanceReported(uint80 roundId, uint256 balance, uint256 interest, uint256 price, uint256 updatedAt)"
      - event: "NextPriceReported(uint256 price)"
  # Superstate USTB NAV oracle. Emits NewCheckpoint anchors; realtime NAV is
  # linearly interpolated between consecutive checkpoints (navs is 6-dec).
  - name: UstbNavOracle
    events:
      - event: "NewCheckpoint(uint64 timestamp, uint64 effectiveAt, uint128 navs)"
  # Spiko USTBL NAV — Chainlink EACAggregatorProxy feed "USTBL NAV" (6-dec). The
  # AnswerUpdated event is emitted by the underlying aggregator, so we index the
  # aggregator address, not the proxy.
  - name: UstblNavFeed
    events:
      - event: "AnswerUpdated(int256 indexed current, uint256 indexed roundId, uint256 updatedAt)"
  # Ondo OUSG NAV — RWAOracleExternalComparisonCheck. Ondo pushes the end-of-day
  # NAV here; newRWAPrice is the OUSG price (18-dec). NAV is a step function
  # (constant between EOD updates).
  - name: OusgOracle
    events:
      - event: "RWAExternalComparisonCheckPriceSet(int256 oldChainlinkPrice, uint80 indexed oldRoundId, int256 newChainlinkPrice, uint80 indexed newRoundId, int256 oldRWAPrice, int256 newRWAPrice)"
  # Centrifuge PoolManager — source of JTRSY (Janus Henderson Anemoy Treasury)
  # price-per-share. PriceUpdate fires for every pool/tranche; the JTRSY handler
  # filters by poolId + trancheId. price is 18-dec, step between updates.
  - name: JtrsyPoolManager
    events:
      - event: "PriceUpdate(uint64 indexed poolId, bytes16 indexed trancheId, address indexed asset, uint256 price, uint64 computedAt)"
